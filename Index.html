<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BUDGETpro</title>

  <!-- FontAwesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- HTML2PDF.js (Export PDF) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <!-- SheetJS / XLSX (Untuk Fitur Import Excel) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <!-- FIREBASE SDK (Database & Storage) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
</head>
<body class="bg-gray-200">
  <div id="root"></div>

  <!-- Script Aplikasi React -->
  <script type="text/babel">

    // ====================================================================
    // ⚠️ PASTE FIREBASE CONFIG ANDA DI SINI
    // ====================================================================
    const firebaseConfig = {
  apiKey: "AIzaSyCpudgGutZp8M1aAlagwgtSUd6uqKFrPO4",
  authDomain: "budgetpro-f860a.firebaseapp.com",
  projectId: "budgetpro-f860a",
  storageBucket: "budgetpro-f860a.firebasestorage.app",
  messagingSenderId: "10277854268",
  appId: "1:10277854268:web:5a21c884c0643ab307f739",
  measurementId: "G-DBVM6F3FNE"
};

    // Inisialisasi Firebase
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();
    const storage = firebase.storage();
    // ====================================================================

    const { useState, useEffect, useRef } = React;
    
    // --- Komponen Icon FontAwesome ---
    const FAIcon = ({ name, size = 20, className = "" }) => (
      <i className={`fa-solid fa-${name} ${className}`} 
         style={{ fontSize: size, width: size, height: size, display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}>
      </i>
    );
    
    const Plus = (p) => <FAIcon name="plus" {...p} />;
    const FileText = (p) => <FAIcon name="file-lines" {...p} />;
    const Camera = (p) => <FAIcon name="camera" {...p} />;
    const Upload = (p) => <FAIcon name="upload" {...p} />;
    const CheckCircle = (p) => <FAIcon name="circle-check" {...p} />;
    const AlertCircle = (p) => <FAIcon name="circle-exclamation" {...p} />;
    const ArrowLeft = (p) => <FAIcon name="arrow-left" {...p} />;
    const ChevronRight = (p) => <FAIcon name="chevron-right" {...p} />;
    const Trash2 = (p) => <FAIcon name="trash-can" {...p} />;
    const Save = (p) => <FAIcon name="floppy-disk" {...p} />;
    const ImageIcon = (p) => <FAIcon name="image" {...p} />;
    const DollarSign = (p) => <FAIcon name="wallet" {...p} />; 
    const TrendingDown = (p) => <FAIcon name="arrow-trend-down" {...p} />;
    const TrendingUp = (p) => <FAIcon name="arrow-trend-up" {...p} />;
    const Minus = (p) => <FAIcon name="minus" {...p} />;
    const Download = (p) => <FAIcon name="download" {...p} />;
    const Printer = (p) => <FAIcon name="file-pdf" {...p} />; 
    const FileInvoice = (p) => <FAIcon name="file-invoice" {...p} />;
    const ExcelIcon = (p) => <FAIcon name="file-excel" {...p} />;
    const UserIcon = (p) => <FAIcon name="user" {...p} />;
    const LockIcon = (p) => <FAIcon name="lock" {...p} />;
    const LogOutIcon = (p) => <FAIcon name="right-from-bracket" {...p} />;

    // Format Rupiah
    const formatRp = (angka) => {
      return new Intl.NumberFormat('id-ID', {
        style: 'currency',
        currency: 'IDR',
        minimumFractionDigits: 0
      }).format(angka || 0);
    };

    // Format Tanggal Display
    const displayDate = (start, end) => {
      if (!start) return '-';
      if (!end || start === end) return start;
      return `${start} s/d ${end}`;
    };

    function App() {
      // Data State
      const [projects, setProjects] = useState([]);
      const [users, setUsers] = useState([]);
      const [currentUser, setCurrentUser] = useState(null);
      const [isInitializing, setIsInitializing] = useState(true);
      
      // View State
      const [currentView, setCurrentView] = useState('dashboard');
      const [activeProject, setActiveProject] = useState(null);
      
      // Modal State
      const [showNewProjectModal, setShowNewProjectModal] = useState(false);
      const [showItemModal, setShowItemModal] = useState(false);
      const [showActualModal, setShowActualModal] = useState(false);
      const [showDetailSidebar, setShowDetailSidebar] = useState(false);
      const [showFullReportSidebar, setShowFullReportSidebar] = useState(false);
      const [selectedItem, setSelectedItem] = useState(null);

      // Custom Delete Confirmation State
      const [deleteConfig, setDeleteConfig] = useState({ isOpen: false, type: '', payload: null, title: '', message: '' });

      // Init Load dari Firebase Realtime Database
      useEffect(() => {
        // Load User Session dari memory browser
        const sessionUser = localStorage.getItem('budget_current_user');
        if (sessionUser) setCurrentUser(JSON.parse(sessionUser));

        // Sinkronisasi data User dari Firebase
        const unsubUsers = db.collection('users').onSnapshot(snapshot => {
           setUsers(snapshot.docs.map(doc => doc.data()));
        });

        // Sinkronisasi data Trip/Project dari Firebase
        const unsubProjects = db.collection('projects').onSnapshot(snapshot => {
           const projectsData = snapshot.docs.map(doc => doc.data());
           // Sortir dari yang terbaru dibuat
           projectsData.sort((a,b) => Number(b.id) - Number(a.id));
           setProjects(projectsData);
           setIsInitializing(false);
        });

        return () => {
          unsubUsers();
          unsubProjects();
        };
      }, []);

      // Auto update state Active Project jika ada orang lain yang merubah datanya di Firebase
      useEffect(() => {
         if (activeProject) {
            const updated = projects.find(p => p.id === activeProject.id);
            if (updated) setActiveProject(updated);
         }
      }, [projects]);

      // --- Modul Auth ---
      const handleLogin = (username, password) => {
        // Fallback jika belum ada user sama sekali di DB, buatkan admin default
        if (users.length === 0 && username === 'admin' && password === 'admin123') {
           const defaultAdmin = { username: 'admin', password: 'admin123', role: 'admin' };
           db.collection('users').doc('admin').set(defaultAdmin);
           const userSession = { username: 'admin', role: 'admin' };
           setCurrentUser(userSession);
           localStorage.setItem('budget_current_user', JSON.stringify(userSession));
           setCurrentView('dashboard');
           return true;
        }

        const found = users.find(u => u.username === username && u.password === password);
        if (found) {
          const userSession = { username: found.username, role: found.role };
          setCurrentUser(userSession);
          localStorage.setItem('budget_current_user', JSON.stringify(userSession));
          setCurrentView('dashboard');
          return true;
        }
        return false;
      };

      const handleRegister = async (username, password, role) => {
        if (users.find(u => u.username === username)) return false; 
        
        const newUser = { username, password, role };
        await db.collection('users').doc(username).set(newUser);
        
        const userSession = { username, role };
        setCurrentUser(userSession);
        localStorage.setItem('budget_current_user', JSON.stringify(userSession));
        setCurrentView('dashboard');
        return true;
      };

      const handleLogout = () => {
        setCurrentUser(null);
        setActiveProject(null);
        setCurrentView('dashboard');
        localStorage.removeItem('budget_current_user');
      };

      // --- Modul Hapus Universal (Firebase) ---
      const triggerDelete = (type, payload, title, message) => {
        setDeleteConfig({ isOpen: true, type, payload, title, message });
      };

      const executeDelete = async () => {
        const { type, payload } = deleteConfig;
        
        if (type === 'project') {
          await db.collection('projects').doc(payload).delete();
          setCurrentView('dashboard');
        } 
        else if (type === 'item') {
          const updatedItems = activeProject.items.filter(i => i.id !== payload);
          const updatedProject = { ...activeProject, items: updatedItems };
          await db.collection('projects').doc(updatedProject.id).set(updatedProject);
          setShowDetailSidebar(false);
          setShowItemModal(false);
        }
        else if (type === 'transaction') {
           const newActuals = payload.currentActuals.filter(a => a.id !== payload.trxId);
           await saveActualsToDB(payload.itemId, newActuals); 
        }
        
        setDeleteConfig({ isOpen: false, type: '', payload: null, title: '', message: '' });
      };

      // --- Handlers App (Menyimpan Langsung ke Firebase) ---
      const handleUpdateProjectInfo = async (field, value) => {
        const updated = { ...activeProject, [field]: value };
        // Update lokal agar UI responsif, Firebase listener akan menormalkan nantinya
        setActiveProject(updated); 
        await db.collection('projects').doc(updated.id).set(updated);
      };

      const handleSaveItem = async (itemData) => {
        let updatedItems = [];
        if (itemData.id) {
          updatedItems = activeProject.items.map(i => i.id === itemData.id ? itemData : i);
        } else {
          updatedItems = [...activeProject.items, { ...itemData, id: Date.now().toString(), actuals: [], status: 'pending' }];
        }
        
        const updatedProject = { ...activeProject, items: updatedItems };
        await db.collection('projects').doc(updatedProject.id).set(updatedProject);
        setShowItemModal(false);
      };

      const saveActualsToDB = async (itemId, newActuals) => {
        const item = activeProject.items.find(i => i.id === itemId);
        const plannedTotal = item.qty * item.budget;
        const actualTotal = newActuals.reduce((sum, act) => sum + Number(act.amount), 0);
        
        let status = 'pending';
        if (newActuals.length > 0) {
          status = 'on-budget';
          if (actualTotal < plannedTotal) status = 'under-budget';
          if (actualTotal > plannedTotal) status = 'over-budget';
        }

        const updatedItems = activeProject.items.map(i => {
          if (i.id === itemId) return { ...i, actuals: newActuals, status };
          return i;
        });

        const updatedProject = { ...activeProject, items: updatedItems };
        await db.collection('projects').doc(updatedProject.id).set(updatedProject);
        
        if (selectedItem && selectedItem.id === itemId) {
            setSelectedItem({ ...item, actuals: newActuals, status });
        }
      };

      // --- Computations ---
      const getItemActualTotal = (item) => {
        if (item.actuals && Array.isArray(item.actuals)) {
          return item.actuals.reduce((sum, a) => sum + Number(a.amount), 0);
        }
        return 0;
      };

      const calculateTotalPlan = (items) => items.reduce((sum, item) => sum + (item.qty * item.budget), 0);
      const calculateTotalActual = (items) => items.reduce((sum, item) => sum + getItemActualTotal(item), 0);

      // --- Filter Project Berdasarkan Role ---
      const displayedProjects = currentUser?.role === 'admin' 
        ? projects 
        : projects.filter(p => p.owner === currentUser?.username);

      // --- Komponen Antarmuka ---

      // Layar Loading Awal
      if (isInitializing) {
         return (
           <div className="min-h-screen bg-blue-600 flex flex-col items-center justify-center p-4">
             <i className="fa-solid fa-spinner fa-spin text-white text-4xl mb-4"></i>
             <p className="text-blue-200 font-bold">Menghubungkan ke Server...</p>
           </div>
         )
      }

      // Layar Login & Registrasi
      const AuthScreen = () => {
        const [isLoginView, setIsLoginView] = useState(true);
        const [username, setUsername] = useState('');
        const [password, setPassword] = useState('');
        const [isAdminReg, setIsAdminReg] = useState(false);
        const [error, setError] = useState('');

        const submitAuth = () => {
          setError('');
          if(!username || !password) {
            setError('Username dan Password wajib diisi');
            return;
          }

          if (isLoginView) {
            const success = handleLogin(username, password);
            if (!success) setError('Username atau Password salah!');
          } else {
            const role = isAdminReg ? 'admin' : 'user';
            const success = handleRegister(username, password, role);
            if (!success) setError('Username sudah digunakan!');
          }
        };

        return (
          <div className="min-h-screen bg-blue-600 flex flex-col items-center justify-center p-4">
            <div className="text-center mb-8 animate-fade-in">
              <div className="w-20 h-20 bg-white rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg text-blue-600">
                <DollarSign size={40} />
              </div>
              <h1 className="text-3xl font-black text-white">BUDGETpro</h1>
              <p className="text-blue-200 mt-2 font-medium text-xs px-6 italic leading-relaxed">
                "semoga membantu kamu mempertanggungjawabkan budget yang sudah dibuat"
              </p>
            </div>

            <div className="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl animate-slide-up">
              <div className="flex mb-6 bg-gray-100 p-1 rounded-xl">
                <button 
                  onClick={() => {setIsLoginView(true); setError('');}} 
                  className={`flex-1 py-2 text-sm font-bold rounded-lg transition-all ${isLoginView ? 'bg-white shadow-sm text-blue-600' : 'text-gray-500'}`}>
                  Masuk
                </button>
                <button 
                  onClick={() => {setIsLoginView(false); setError('');}} 
                  className={`flex-1 py-2 text-sm font-bold rounded-lg transition-all ${!isLoginView ? 'bg-white shadow-sm text-blue-600' : 'text-gray-500'}`}>
                  Daftar
                </button>
              </div>

              {error && <div className="bg-red-50 text-red-600 p-3 rounded-xl text-xs font-bold text-center mb-4">{error}</div>}

              <div className="space-y-4">
                <div>
                  <label className="block text-[10px] font-bold text-gray-500 uppercase mb-1">Username</label>
                  <div className="relative">
                    <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                      <UserIcon size={16} />
                    </div>
                    <input type="text" value={username} onChange={e=>setUsername(e.target.value)}
                      className="w-full border-2 border-gray-200 rounded-xl pl-10 p-3 text-sm focus:border-blue-500 outline-none font-bold text-gray-800" 
                      placeholder="Masukkan username" />
                  </div>
                </div>
                
                <div>
                  <label className="block text-[10px] font-bold text-gray-500 uppercase mb-1">Password</label>
                  <div className="relative">
                    <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                      <LockIcon size={16} />
                    </div>
                    <input type="password" value={password} onChange={e=>setPassword(e.target.value)}
                      className="w-full border-2 border-gray-200 rounded-xl pl-10 p-3 text-sm focus:border-blue-500 outline-none font-bold text-gray-800" 
                      placeholder="Masukkan password" />
                  </div>
                </div>

                {!isLoginView && (
                  <label className="flex items-center gap-2 p-3 border-2 border-gray-200 rounded-xl cursor-pointer hover:bg-gray-50">
                    <input type="checkbox" checked={isAdminReg} onChange={e=>setIsAdminReg(e.target.checked)} className="w-4 h-4 text-blue-600 rounded" />
                    <span className="text-xs font-bold text-gray-700">Daftar sebagai Admin HR/Finance</span>
                  </label>
                )}

                <button onClick={submitAuth} className="w-full py-3.5 bg-blue-600 text-white rounded-xl font-bold text-sm shadow-md active:bg-blue-700 mt-2">
                  {isLoginView ? 'Masuk ke Aplikasi' : 'Buat Akun'}
                </button>
                
                {/* Petunjuk akun default */}
                {isLoginView && users.length === 0 && (
                   <p className="text-xs text-gray-400 text-center mt-2">Masuk dengan admin / admin123 untuk pertama kali</p>
                )}
              </div>
            </div>
            
            <p className="text-white/60 text-xs mt-8 font-medium animate-fade-in text-center leading-relaxed">
              Internal Use Only<br/>by RBN ;D
            </p>
          </div>
        );
      }

      // 0. Komponen Konfirmasi Universal
      const ConfirmModal = () => {
        if (!deleteConfig.isOpen) return null;
        return (
          <div className="fixed inset-0 z-[100] bg-black/70 flex items-center justify-center p-4 animate-fade-in no-print">
            <div className="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl animate-slide-up">
              <div className="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4">
                <AlertCircle size={32} />
              </div>
              <h3 className="font-black text-xl text-center text-gray-800 mb-2">{deleteConfig.title}</h3>
              <p className="text-gray-500 text-center text-sm mb-6 leading-relaxed">{deleteConfig.message}</p>
              
              <div className="flex gap-3">
                <button onClick={() => setDeleteConfig({ isOpen: false })} className="flex-1 bg-gray-100 text-gray-700 py-3 rounded-xl font-bold text-sm">Batal</button>
                <button onClick={executeDelete} className="flex-1 bg-red-600 text-white py-3 rounded-xl font-bold text-sm shadow-md active:bg-red-700">Ya, Hapus</button>
              </div>
            </div>
          </div>
        );
      }

      // 1. Modal Pembuatan Trip Baru & Import Excel
      const NewProjectModal = () => {
        const [formData, setFormData] = useState({
          name: '', target: '', startDate: new Date().toISOString().split('T')[0], endDate: new Date().toISOString().split('T')[0]
        });

        const handleDownloadTemplate = () => {
          const wsData = [
              ["Item", "Qty", "Unit", "Budget Satuan", "Keterangan"],
              ["Hotel", 1, "malam", 350000, "Contoh: Hotel untuk tim"],
              ["Tiket Pesawat", 2, "orang", 1500000, "Contoh: PP Jakarta"]
          ];
          const ws = XLSX.utils.aoa_to_sheet(wsData);
          ws['!cols'] = [{wch: 25}, {wch: 8}, {wch: 12}, {wch: 18}, {wch: 35}];
          const wb = XLSX.utils.book_new();
          XLSX.utils.book_append_sheet(wb, ws, "Template Budget");
          XLSX.writeFile(wb, "Template_BUDGETpro.xlsx");
        };

        const handleImportExcel = (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = async (evt) => {
              const bstr = evt.target.result;
              const wb = XLSX.read(bstr, { type: 'binary' });
              const wsname = wb.SheetNames[0];
              const ws = wb.Sheets[wsname];
              const data = XLSX.utils.sheet_to_json(ws);
              
              const importedItems = data.map((row, idx) => ({
                  id: Date.now().toString() + '_' + idx,
                  name: row['Item'] || row['Nama Item'] || 'Item ' + (idx+1),
                  qty: Number(row['Qty'] || row['Jumlah'] || 1),
                  unit: row['Unit'] || row['Satuan'] || 'paket',
                  budget: Number(row['Budget Satuan'] || row['Budget'] || row['Harga'] || 0),
                  notes: row['Keterangan'] || row['Catatan'] || '',
                  actuals: [],
                  status: 'pending'
              }));

              const newProject = {
                  id: Date.now().toString(),
                  name: formData.name || 'Project Hasil Import',
                  target: formData.target || '',
                  startDate: formData.startDate,
                  endDate: formData.endDate,
                  owner: currentUser.username, 
                  items: importedItems
              };

              await db.collection('projects').doc(newProject.id).set(newProject);
              setActiveProject(newProject);
              setShowNewProjectModal(false);
              setCurrentView('project_detail');
          };
          reader.readAsBinaryString(file);
        };

        const handleCreateManual = async () => {
          const newProject = {
              id: Date.now().toString(),
              name: formData.name || 'Project / Event Baru',
              target: formData.target || '',
              startDate: formData.startDate,
              endDate: formData.endDate,
              owner: currentUser.username, 
              items: []
          };
          await db.collection('projects').doc(newProject.id).set(newProject);
          setActiveProject(newProject);
          setShowNewProjectModal(false);
          setCurrentView('project_detail');
        };

        return (
          <div className="fixed inset-0 bg-black/70 z-50 flex flex-col justify-end animate-fade-in no-print">
            <div className="absolute inset-0" onClick={() => setShowNewProjectModal(false)}></div>
            <div className="bg-white rounded-t-3xl w-full max-h-[95vh] flex flex-col relative z-10 animate-slide-up shadow-2xl">
              
              <div className="bg-white px-6 py-5 border-b border-gray-100 flex justify-between items-center rounded-t-3xl flex-shrink-0">
                <div>
                  <p className="text-[10px] uppercase font-bold text-blue-600 mb-0.5">Persiapan</p>
                  <h3 className="font-bold text-gray-800 text-lg">Buat Event / Trip Baru</h3>
                </div>
                <button onClick={() => setShowNewProjectModal(false)} className="w-8 h-8 flex items-center justify-center bg-gray-100 text-gray-600 rounded-full active:bg-gray-200">
                  <FAIcon name="xmark" size={16} />
                </button>
              </div>
              
              <div className="p-6 overflow-y-auto space-y-5">
                <div>
                  <label className="block text-xs font-bold text-gray-500 uppercase mb-2">Nama Event</label>
                  <input type="text" className="w-full border-2 border-gray-200 rounded-xl p-3 text-sm focus:border-blue-500 outline-none"
                    value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} placeholder="Contoh: Perjalanan Dinas JKT" />
                </div>
                
                <div className="grid grid-cols-2 gap-3">
                  <div>
                    <label className="block text-xs font-bold text-gray-500 uppercase mb-2">Mulai</label>
                    <input type="date" className="w-full border-2 border-gray-200 rounded-xl p-3 text-sm focus:border-blue-500 outline-none"
                      value={formData.startDate} onChange={e => setFormData({...formData, startDate: e.target.value})} />
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-gray-500 uppercase mb-2">Selesai</label>
                    <input type="date" className="w-full border-2 border-gray-200 rounded-xl p-3 text-sm focus:border-blue-500 outline-none"
                      value={formData.endDate} onChange={e => setFormData({...formData, endDate: e.target.value})} />
                  </div>
                </div>

                <div>
                  <label className="block text-xs font-bold text-gray-500 uppercase mb-2">Target (Opsional)</label>
                  <textarea className="w-full border-2 border-gray-200 rounded-xl p-3 text-sm focus:border-blue-500 outline-none resize-none"
                    rows="2" value={formData.target} onChange={e => setFormData({...formData, target: e.target.value})} placeholder="Tujuan perjalanan..." />
                </div>

                <div className="pt-4 border-t border-gray-200">
                  <p className="text-sm font-bold text-gray-800 mb-3">Pilih Cara Input Budget:</p>
                  
                  <div className="space-y-3">
                    <button onClick={handleCreateManual} className="w-full py-3 bg-blue-600 text-white rounded-xl font-bold text-sm shadow-md active:bg-blue-700 flex items-center justify-center gap-2">
                      <Plus size={16} /> Mulai Kosong (Input Manual)
                    </button>
                    
                    <div className="relative">
                      <div className="absolute inset-0 flex items-center"><div className="w-full border-t border-gray-200"></div></div>
                      <div className="relative flex justify-center text-sm"><span className="px-2 bg-white text-gray-400">ATAU</span></div>
                    </div>

        const [receiptUrl, setReceiptUrl] = useState(null);
        const [isUploading, setIsUploading] = useState(false);

        const plannedTotal = selectedItem ? (selectedItem.qty * selectedItem.budget) : 0;
        const draftTotal = actuals.reduce((sum, act) => sum + Number(act.amount), 0);
        const variance = plannedTotal - draftTotal;

        const handleFileChange = (e) => {
          const file = e.target.files[0];
          if (file) {
            const reader = new FileReader();
            reader.onloadend = () => setReceiptUrl(reader.result); // Simpan sementara sebagai Base64 untuk preview
            reader.readAsDataURL(file);
          }
        };

        const handleAddTransaction = async () => {
          const numericAmount = Number(newAmount.replace(/\./g, ''));
          if (!numericAmount || numericAmount <= 0) return;

          setIsUploading(true);
          let finalUrl = receiptUrl;

          try {
            // Jika receiptUrl berbentuk Base64 (gambar baru dipilih), Upload ke Cloud Storage!
            if (receiptUrl && receiptUrl.startsWith('data:')) {
              const fileName = `receipts/${activeProject.id}/${selectedItem.id}_${Date.now()}.jpg`;
              const ref = storage.ref().child(fileName);
              await ref.putString(receiptUrl, 'data_url');
              finalUrl = await ref.getDownloadURL(); // Dapatkan Link Publik dari Server
            }

            const newAct = {
              id: Date.now().toString(),
              amount: numericAmount,
              description: newDesc,
              receiptUrl: finalUrl
            };
            setActuals([...actuals, newAct]);
            setNewAmount('');
            setNewDesc('');
            setReceiptUrl(null);
          } catch (error) {
            alert("Gagal mengunggah foto. Pastikan konfigurasi Firebase Storage Anda benar.");
            console.error(error);
          }
          setIsUploading(false);
        };

        const handleRemoveTransaction = (id) => {

            <ConfirmModal />
            
            <style dangerouslySetInnerHTML={{__html: `
              .animate-fade-in { animation: fadeIn 0.2s ease-out; }
              .animate-slide-up { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
              .animate-slide-left { animation: slideLeft 0.35s cubic-bezier(0.16, 1, 0.3, 1); }
              
              @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
              @keyframes slideUp { from { transform: translateY(100%); opacity: 0.5; } to { transform: translateY(0); opacity: 1; } }
              @keyframes slideLeft { from { transform: translateX(100%); } to { transform: translateX(0); } }
              
              ::-webkit-scrollbar { width: 0px; background: transparent; }
            `}} />
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
